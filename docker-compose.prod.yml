services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - deploy/.env.production
    restart: unless-stopped
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - APP_DOMAIN=${APP_DOMAIN:-localhost}
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
